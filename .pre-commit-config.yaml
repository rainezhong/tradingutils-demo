repos:
  # Fast linting + formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checking on strategy + core interfaces
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--config-file=mypy.ini, strategies/, core/]
        pass_filenames: false
        additional_dependencies: []

  # Architecture tests — interface compliance, registration, config patterns
  - repo: local
    hooks:
      - id: architecture-tests
        name: architecture tests
        entry: python3 -m pytest tests/test_architecture.py -x -q
        language: system
        pass_filenames: false
        always_run: true
