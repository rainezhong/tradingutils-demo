[mypy]
python_version = 3.9
warn_unused_configs = True
warn_return_any = True
warn_unused_ignores = True
check_untyped_defs = True

# Strategy code should be well-typed
[mypy-strategies.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# Core interfaces should be well-typed
[mypy-core.order_manager.*]
disallow_untyped_defs = True

[mypy-core.exchange_client.*]
disallow_untyped_defs = True

[mypy-core.market.*]
disallow_untyped_defs = True

# Legacy code — don't enforce yet
[mypy-src.*]
ignore_errors = True

# Third-party libraries without stubs
[mypy-schedule.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-websockets.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True
