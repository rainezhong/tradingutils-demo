# Prometheus configuration for Trading Arbitrage System
# Scrapes metrics from the trading application and exports them for Grafana

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    service: 'trading-arbitrage'

# Alerting configuration (optional - alerts sent to Alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files for recording rules and alerts
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # Trading application metrics
  # The application exposes metrics on port 9091 via MetricsCollector
  - job_name: 'trading-arbitrage'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          instance: 'arbitrage-system'
          environment: 'production'
    # Scrape more frequently for trading metrics
    scrape_interval: 5s
    scrape_timeout: 5s
    metrics_path: /metrics

  # Alternative: if running application in Docker
  # - job_name: 'trading-arbitrage-docker'
  #   static_configs:
  #     - targets: ['trading-app:9091']

  # PostgreSQL metrics (if using postgres_exporter)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis metrics (if using redis_exporter)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
